const FILTER_OPTIONS = [
  {key:"gluten_free",label:"ללא גלוטן",icon:"🌾",check:d=>!d.gluten},
  {key:"dairy_free",label:"ללא חלבי",icon:"🥛",check:d=>!d.dairy},
  {key:"vegan",label:"טבעוני",icon:"🌱",check:d=>d.vegan},
  {key:"no_nuts",label:"ללא אגוזים",icon:"🥜",check:d=>!d.allergens.some(a=>a.includes("אגוזים"))},
  {key:"fish",label:"דגים",icon:"🐟",check:d=>d.fish},
  {key:"meat",label:"בשרי",icon:"🥩",check:d=>d.meat},
];

// ============================================================
// STATE
// ============================================================
let state = {
  menu: [],
  search: "",
  activeCategory: null,
  activeFilters: [],
  openDish: null,
  adminMode: false,
  showPinDialog: false,
  showEditor: null, // null | 'new' | dish id
  pinError: "",
};

function loadMenu() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_MENU));
}

function saveMenu(menu) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(menu));
}

function getPin() {
  return localStorage.getItem(PIN_KEY) || DEFAULT_PIN;
}

function setPin(p) {
  localStorage.setItem(PIN_KEY, p);
}

function isAdminSession() {
  return sessionStorage.getItem(ADMIN_SESSION_KEY) === "true";
}

function setAdminSession(v) {
  sessionStorage.setItem(ADMIN_SESSION_KEY, v ? "true" : "false");
}

state.menu = loadMenu();
state.adminMode = isAdminSession();

// ============================================================
// HELPERS
// ============================================================
function getCategories(menu) {
  const cats = [];
  menu.forEach(d => { if (!cats.includes(d.category)) cats.push(d.category); });
  return cats;
}

function filterMenu(menu, search, category, filters) {
  let items = menu;
  if (search.trim()) {
    const q = search.trim().toLowerCase();
    items = items.filter(d =>
      d.name.includes(q) || d.description.includes(q) ||
      d.allergens.some(a => a.includes(q)) || d.category.includes(q)
    );
  }
  if (category) items = items.filter(d => d.category === category);
  for (const fKey of filters) {
    const fd = FILTER_OPTIONS.find(f => f.key === fKey);
    if (fd) items = items.filter(fd.check);
  }
  return items;
}

function groupByCategory(items) {
  const groups = {};
  items.forEach(d => {
    if (!groups[d.category]) groups[d.category] = [];
    groups[d.category].push(d);
  });
  return groups;
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function genId() {
  return 'dish_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
}

// RENDER

function render() {
  const app = document.getElementById('app');
  const filtered = filterMenu(state.menu, state.search, state.activeCategory, state.activeFilters);
  const grouped = groupByCategory(filtered);

  let html = '';

  // Header
  html += `<div class="header">

      </div>

      <button class="tab${!state.activeCategory ? ' active' : ''}" onclick="setCategory(null)">הכל</button>
      ${categories.map(c => `<button class="tab${state.activeCategory === c ? ' active' : ''}" onclick="setCategory('${esc(c)}')">${esc(c)}</button>`).join('')}
    </div>
    <div class="filters">
      ${FILTER_OPTIONS.map(f => `<button class="filter-btn${state.activeFilters.includes(f.key) ? ' active' : ''}" onclick="toggleFilter('${f.key}')">${f.icon} ${f.label}</button>`).join('')}
    </div>
  </div>`;

  // Content
  html += `<div class="content">`;
  html += `<div class="count">${filtered.length} מנות${state.activeFilters.length > 0 || state.search || state.activeCategory ? ' (מסוננות)' : ''}</div>`;

  const catKeys = Object.keys(grouped);

    html += `<div class="empty"><div class="empty-icon">🔍</div><div style="font-size:15px">לא נמצאו מנות תואמות</div><div style="font-size:12px;margin-top:4px">נסה לשנות את החיפוש או הפילטרים</div></div>`;
  } else {
    catKeys.forEach(cat => {
      html += `<div class="cat-group"><h2 class="cat-title">${esc(cat)}</h2>`;
      grouped[cat].forEach(dish => {
        const isOpen = state.openDish === dish.id;
        html += `<div class="dish${isOpen ? ' open' : ''}" onclick="toggleDish('${dish.id}')">`;
        html += `<div class="dish-header"><div style="flex:1;min-width:0">`;
        html += `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">`;
        html += `<span class="dish-name">${esc(dish.name)}</span>`;
        if (dish.raw) html += `<span class="badge badge-purple">נא</span>`;
        html += `</div><div class="dish-badges">`;
        if (dish.gluten) html += `<span class="badge badge-red">גלוטן</span>`;
        if (dish.dairy) html += `<span class="badge badge-blue">חלבי</span>`;
        if (dish.meat) html += `<span class="badge badge-red">בשרי</span>`;
        if (dish.fish) html += `<span class="badge badge-blue">דגים</span>`;
        if (dish.vegan) html += `<span class="badge badge-green">טבעוני</span>`;
        dish.allergens.filter(a=>a.includes("אגוזים")).forEach(a => { html += `<span class="badge badge-red">${esc(a)}</span>`; });
        dish.allergens.filter(a=>a.includes("שומשום")).forEach(a => { html += `<span class="badge badge-amber">${esc(a)}</span>`; });
        html += `</div></div><span class="chevron">▾</span></div>`;

        if (isOpen) {
          html += `<div class="dish-detail">`;
          html += `<p class="dish-desc">${esc(dish.description)}</p>`;
          if (dish.allergens.length > 0) {
            html += `<div class="detail-section"><div class="detail-label allergen">⚠️ אלרגנים</div>`;
            dish.allergens.forEach(a => { html += `<div class="detail-item allergen">• ${esc(a)}</div>`; });
            html += `</div>`;
          }
          if (dish.modifications.length > 0) {
            html += `<div class="detail-section"><div class="detail-label mod">🔄 שינויים אפשריים</div>`;
            dish.modifications.forEach(m => { html += `<div class="detail-item mod">• ${esc(m)}</div>`; });
            html += `</div>`;
          }
          if (dish.serviceNotes.length > 0) {
            html += `<div class="detail-section"><div class="detail-label note">💡 הערות שירות</div>`;
            dish.serviceNotes.forEach(n => { html += `<div class="detail-item note">• ${esc(n)}</div>`; });
            html += `</div>`;
          }
          if (state.adminMode) {
            html += `<div style="display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #333">
              <button class="btn btn-gold" onclick="event.stopPropagation();openEditor('${dish.id}')">✏️ ערוך</button>
              <button class="btn btn-danger" onclick="event.stopPropagation();deleteDish('${dish.id}')">🗑 מחק</button>
            </div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    });
  }
  html += `</div>`;

  // Footer rules
  html += `<div class="footer-rules">
    <h3>⚠️ כללי חשוב</h3>
    <div>
      <div>• המטבח אינו נקי מאלרגנים (אגוזים, גלוטן וכו') — לשקף ללקוח!</div>

      <button class="btn btn-ghost" onclick="changePin()">🔑 שנה PIN</button>
    </div>` : ''}
  </div>`;

  // FAB
  html += `<button class="fab${state.adminMode ? ' admin-active' : ''}" onclick="fabClick()" title="${state.adminMode ? 'יציאה ממצב אדמין' : 'מצב אדמין'}">${state.adminMode ? '🔓' : '🔒'}</button>`;

  app.innerHTML = html;

  // Overlays
  if (state.showPinDialog) renderPinDialog();
  if (state.showEditor !== null) renderEditor();
}

      <div class="pin-error" id="pin-error">${state.pinError}</div>
      <div style="margin-top:16px"><button class="btn btn-ghost" onclick="closePinDialog()">ביטול</button></div>
    </div>`;
  setTimeout(() => { const el = document.getElementById('pin-input'); if(el) el.focus(); }, 50);
}

function closePinDialog() {
  state.showPinDialog = false;
  state.pinError = "";
  const overlay = document.getElementById('pin-overlay');
  if (overlay) overlay.remove();
}

function checkPin(val) {
  if (val.length >= 4) {
    if (val === getPin()) {
      state.adminMode = true;
      setAdminSession(true);
      closePinDialog();
      render();
    } else {
      state.pinError = "קוד שגוי";
      const el = document.getElementById('pin-error');
      if (el) el.textContent = state.pinError;
      const inp = document.getElementById('pin-input');
      if (inp) { inp.value = ''; inp.style.borderColor = 'var(--red)'; setTimeout(()=>{inp.style.borderColor='#444'},600); }
    }
  }
}

// ============================================================
// EDITOR
// ============================================================
function renderEditor() {
  let overlay = document.getElementById('editor-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'editor-overlay';
    overlay.className = 'admin-overlay';
    document.body.appendChild(overlay);
  }

  const isNew = state.showEditor === 'new';
  const dish = isNew ? {id:'',name:'',category:'',description:'',allergens:[],gluten:false,dairy:false,meat:false,fish:false,raw:false,vegan:false,modifications:[],serviceNotes:[]} : state.menu.find(d=>d.id===state.showEditor);
  if (!dish) { closeEditor(); return; }

  const categories = getCategories(state.menu);

  overlay.innerHTML = `
    <div class="admin-modal">
      <h2>${isNew ? '➕ מנה חדשה' : '✏️ עריכת מנה'}</h2>
      <label>שם המנה</label>
      <input class="admin-input" id="ed-name" value="${esc(dish.name)}">
      <label>קטגוריה</label>
      <input class="admin-input" id="ed-category" value="${esc(dish.category)}" list="cat-list" placeholder="בחר או הקלד קטגוריה חדשה">
      <datalist id="cat-list">${categories.map(c=>`<option value="${esc(c)}">`).join('')}</datalist>
      <label>תיאור (מרכיבים)</label>
      <textarea class="admin-textarea" id="ed-desc" rows="3">${esc(dish.description)}</textarea>
      <label>סימונים</label>
      <div class="admin-row">
        <label class="admin-check"><input type="checkbox" id="ed-gluten" ${dish.gluten?'checked':''}> גלוטן</label>
        <label class="admin-check"><input type="checkbox" id="ed-dairy" ${dish.dairy?'checked':''}> חלבי</label>
        <label class="admin-check"><input type="checkbox" id="ed-meat" ${dish.meat?'checked':''}> בשרי</label>
        <label class="admin-check"><input type="checkbox" id="ed-fish" ${dish.fish?'checked':''}> דגים</label>
        <label class="admin-check"><input type="checkbox" id="ed-raw" ${dish.raw?'checked':''}> נא</label>
        <label class="admin-check"><input type="checkbox" id="ed-vegan" ${dish.vegan?'checked':''}> טבעוני</label>
      </div>
      <label>אלרגנים (שורה לכל אלרגן)</label>
      <textarea class="admin-textarea" id="ed-allergens" rows="2" placeholder="גלוטן&#10;אגוזים (לוז, קשיו)">${dish.allergens.join('\n')}</textarea>
      <label>שינויים אפשריים (שורה לכל שינוי)</label>
      <textarea class="admin-textarea" id="ed-mods" rows="2">${dish.modifications.join('\n')}</textarea>
      <label>הערות שירות (שורה לכל הערה)</label>
      <textarea class="admin-textarea" id="ed-notes" rows="2">${dish.serviceNotes.join('\n')}</textarea>
      <div class="admin-actions">
        <button class="btn btn-ghost" onclick="closeEditor()">ביטול</button>
        <button class="btn btn-primary" onclick="saveEditor('${isNew ? 'new' : dish.id}')">💾 שמור</button>
      </div>
    </div>`;
}

function closeEditor() {
  state.showEditor = null;
  const overlay = document.getElementById('editor-overlay');
  if (overlay) overlay.remove();
}

function saveEditor(id) {
  const name = document.getElementById('ed-name').value.trim();
  const category = document.getElementById('ed-category').value.trim();
  const description = document.getElementById('ed-desc').value.trim();
  const gluten = document.getElementById('ed-gluten').checked;
  const dairy = document.getElementById('ed-dairy').checked;
  const meat = document.getElementById('ed-meat').checked;
  const fish = document.getElementById('ed-fish').checked;
  const raw = document.getElementById('ed-raw').checked;
  const vegan = document.getElementById('ed-vegan').checked;
  const allergens = document.getElementById('ed-allergens').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const modifications = document.getElementById('ed-mods').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const serviceNotes = document.getElementById('ed-notes').value.split('\n').map(s=>s.trim()).filter(Boolean);

  if (!name || !category) { alert('שם וקטגוריה הם שדות חובה'); return; }

  const dish = {id: id === 'new' ? genId() : id, name, category, description, allergens, gluten, dairy, meat, fish, raw, vegan, modifications, serviceNotes};

  if (id === 'new') {
    state.menu.push(dish);
  } else {
    const idx = state.menu.findIndex(d => d.id === id);
    if (idx >= 0) state.menu[idx] = dish;
  }

  saveMenu(state.menu);
  closeEditor();
  render();
}

// ============================================================
// ACTIONS
// ============================================================
function onSearch(val) {
  state.search = val;
  render();
  // Restore cursor position
  const inp = document.querySelector('.search-box');
  if (inp) { inp.focus(); inp.setSelectionRange(val.length, val.length); }
}

function setCategory(cat) {
  state.activeCategory = cat;
  render();
}

function toggleFilter(key) {
  const idx = state.activeFilters.indexOf(key);
  if (idx >= 0) state.activeFilters.splice(idx, 1);
  else state.activeFilters.push(key);
  render();
}

function toggleDish(id) {
  state.openDish = state.openDish === id ? null : id;
  render();
}

function openEditor(id) {
  state.showEditor = id;
  renderEditor();
}

function deleteDish(id) {
  const dish = state.menu.find(d => d.id === id);
  if (!dish) return;
  if (!confirm(`למחוק את "${dish.name}"?`)) return;
  state.menu = state.menu.filter(d => d.id !== id);
  saveMenu(state.menu);
  if (state.openDish === id) state.openDish = null;
  render();
}

function fabClick() {
  if (state.adminMode) {
    state.adminMode = false;
    setAdminSession(false);
    render();
  } else {
    state.showPinDialog = true;
    renderPinDialog();
  }
}

function exportData() {
  const data = JSON.stringify(state.menu, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `paseo-menu-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      if (!confirm(`לייבא ${data.length} מנות? זה יחליף את הנתונים הקיימים.`)) return;
      state.menu = data;
      saveMenu(state.menu);
      render();
      alert('הייבוא הצליח!');
    } catch(err) {
      alert('שגיאה בקובץ: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  if (!confirm('לאפס את כל הנתונים לברירת המחדל? כל השינויים שלך יימחקו.')) return;
  state.menu = JSON.parse(JSON.stringify(DEFAULT_MENU));
  saveMenu(state.menu);
  render();
}

function changePin() {
  const newPin = prompt('הזן PIN חדש (4-6 ספרות):');
  if (!newPin || newPin.length < 4 || newPin.length > 6) {
    alert('PIN חייב להיות 4-6 תווים');
    return;
  }
  setPin(newPin);
  alert('ה-PIN שונה בהצלחה');
}

// ============================================================
// PWA / SERVICE WORKER
// ============================================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'block';
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
}

// Register inline service worker
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'paseo-allergen-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// Generate manifest dynamically
const manifest = {
  name: "פסאו — מדריך אלרגנים",
  short_name: "פסאו מדריך",
  start_url: ".",
  display: "standalone",
  background_color: "#141414",
  theme_color: "#141414",
  orientation: "portrait",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#5B7A5E"/><text x="50" y="65" text-anchor="middle" font-size="50">🍽</text></svg>'),
    sizes: "512x512",
    type: "image/svg+xml"
  }]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestUrl = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestUrl;
document.head.appendChild(link);

// ============================================================
// INIT
// ============================================================
render();
</script>
